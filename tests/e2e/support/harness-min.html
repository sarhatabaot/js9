<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <!-- 'unsafe-eval' is required for wasm on Chrome (see tests/smoke.html) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' http://localhost:* ws://localhost:* 'unsafe-eval'; connect-src 'self' http://localhost:* ws://localhost:*; img-src 'self' data:">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link type="text/css" rel="stylesheet" href="/_site/js9support.css">
  <link type="text/css" rel="stylesheet" href="/_site/js9.css">
  <!-- No back-end helper: helperType "none" so JS9 never waits on socket.io. -->
  <script type="text/javascript">
    var JS9Prefs = { globalOpts: { helperType: "none", debug: 0 } };
  </script>
  <script type="text/javascript" src="/_site/js9support.min.js"></script>
  <script type="text/javascript" src="/_site/js9.min.js"></script>
  <script type="text/javascript" src="/_site/js9plugins.min.js"></script>
  <title>JS9 e2e harness (min bundle)</title>
</head>
<body>
  <div class="JS9Menubar" id="JS9Menubar"></div>
  <div class="JS9Toolbar" id="JS9Toolbar"></div>
  <div class="JS9" id="JS9"></div>
  <div class="JS9Statusbar" id="JS9Statusbar"></div>
</body>
</html>
