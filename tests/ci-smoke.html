<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
   "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <!-- CSP mirrors tests/smoke.html: 'unsafe-eval' is required for wasm on Chrome -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' http://localhost:* https://localhost:* ws://localhost:* 'unsafe-eval'; connect-src 'self' http://localhost:* https://localhost:* ws://localhost:*; img-src 'self' data:">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link type="text/css" rel="stylesheet" href="../js9support.css">
  <link type="text/css" rel="stylesheet" href="../js9.css">
  <!-- Inline prefs instead of ../js9prefs.js: no back-end helper for a
       self-contained headless test. helperType "none" => JS9 does not wait on
       a socket.io connection, so queued preloads fire once wasm is ready. -->
  <script type="text/javascript">
    var JS9Prefs = { globalOpts: { helperType: "none", debug: 0 } };
  </script>
  <script type="text/javascript" src="../js9support.js"></script>
  <script type="text/javascript" src="../js9.js"></script>
  <script type="text/javascript" src="../js9plugins.js"></script>
  <title>JS9 CI smoke test</title>
</head>
<body>
  <div class="JS9Menubar" id="JS9Menubar"></div>
  <div class="JS9" id="JS9"></div>
  <div class="JS9Statusbar" id="JS9Statusbar"></div>

  <script type="text/javascript">
    // Signals consumed by the Playwright runner (tests/ci-smoke.mjs).
    // window.__js9smoke is set to a result object on success or failure.
    window.__js9smoke = null;
    function js9smokeFail(msg){ window.__js9smoke = { ok: false, error: String(msg) }; }
    window.addEventListener("error", function(e){ js9smokeFail(e.message); });

    $(document).ready(function(){
      try {
        // JS9.Preload queues the request until the wasm module is ready,
        // unlike JS9.Load which errors if astroem hasn't loaded yet.
        JS9.Preload("../build/i800400.fits.gz", {
          scale: "log",
          colormap: "viridis",
          onload: function(im){
            try {
              var d = JS9.GetImageData(false); // header + dims, no pixel array
              window.__js9smoke = {
                ok: true,
                id: d.id,
                width: d.width,
                height: d.height,
                bitpix: d.bitpix
              };
            } catch(err){ js9smokeFail(err); }
          }
        });
      } catch(err){ js9smokeFail(err); }
    });
  </script>
</body>
</html>
