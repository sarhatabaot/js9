name: CI

# Phase 1 safety net for the modernization effort: syntax-check the shipped JS
# and run a headless smoke test that loads a FITS image in Chromium.
# Baseline captured in BASELINE.md. Node 22 = current, Node 24 = forward target (LTS).

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    name: smoke (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check shipped JS
        run: |
          for f in js9.js js9.min.js js9-allinone.js js9support.js \
                   js9plugins.js js9Helper.js js9worker.js astroem.js; do
            node --check "$f" && echo "OK   $f"
          done

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Build minified bundle (esbuild, no JVM)
        run: npm run build:min

      - name: End-to-end tests (source + minified bundles)
        run: npm test
