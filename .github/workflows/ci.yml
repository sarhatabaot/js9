name: CI

# Build + type-check + syntax-check the shipped JS across the Node matrix. The
# end-to-end Playwright suite (Chromium + Firefox) runs in its own workflow,
# .github/workflows/playwright.yml.
# Node 22 = current, Node 24 = forward target (LTS).

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    name: smoke (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Type-check the Node tooling (scripts, configs, test infra)
        # tsc with checkJs over the modern ESM tooling only (see tsconfig.json).
        # The untyped browser core (src/js9/*) is intentionally out of scope.
        run: npm run typecheck

      - name: Build the site (concat + esbuild + all-in-one + docs -> _site/)
        # also runs via the package.json "prepare" hook on npm ci; kept explicit.
        # The built site (_site/) is not committed.
        run: npm run build

      - name: Syntax-check JS (node sources + assembled/generated bundles in _site/)
        # The browser core is now split into src/js9/*.js fragments; those are not
        # independently parseable (the IIFE wrapper spans several files), so we
        # syntax-check the assembled _site/js9.js instead of the fragments.
        run: |
          for f in server/js9Helper.js bin/js9Msg.js bin/js9Regions.js \
                   src/js9worker.js src/astroem.js \
                   _site/js9.js _site/js9.min.js _site/js9-allinone.js \
                   _site/js9support.min.js _site/js9plugins.js; do
            node --check "$f" && echo "OK   $f"
          done
