name: Publish to npm

# SCAFFOLD — not functional until the prerequisites below are met. It is wired
# to run on a published GitHub Release (or manual dispatch) so it stays inert
# until you make a release.
#
# Package name/version/contents are set (js9-modern; package.json "files"
# whitelists the built _site/ bundles — verified with `npm pack --dry-run`).
# REMAINING PREREQUISITES before this can run:
#   1. An npm account with 2FA enabled that owns (or can create) "js9-modern".
#   2. Authentication — pick one:
#      a. Trusted publishing (recommended): configure this repo as a trusted
#         publisher for js9-modern on npmjs.com; then no token is needed and
#         --provenance works via OIDC (id-token: write below).
#      b. Token: add an npm automation token as the NPM_TOKEN repo secret and
#         set NODE_AUTH_TOKEN in the publish step.
#   3. Cut a GitHub Release (or dispatch manually) to trigger a publish.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # provenance / trusted publishing

jobs:
  publish:
    # DISABLED — preparation only. This job will not run (even on a release or
    # manual dispatch) until the npm account + auth are set up. To enable,
    # delete this `if: false` line.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Fail-safe review: prints the exact file list that would be published.
      - run: npm pack --dry-run

      - name: Publish (experimental dist-tag)
        # --tag experimental: publishes under the "experimental" tag, NOT
        # "latest", so `npm install js9-modern` won't pull it — users opt in with
        # `npm install js9-modern@experimental`. Combined with the prerelease
        # version (3.10.0-experimental.N), it's never installed by default.
        # To graduate: set a stable version (3.10.0) and drop --tag (-> latest).
        run: npm publish --tag experimental --provenance --access public
        # For token auth instead of trusted publishing:
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
