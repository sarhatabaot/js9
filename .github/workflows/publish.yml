name: Publish to npm

# SCAFFOLD — not functional until the prerequisites below are met. It is wired
# to run on a published GitHub Release (or manual dispatch) so it stays inert
# until you make a release.
#
# PREREQUISITES (do these first):
#   1. npm account + org, with 2FA enabled.
#   2. Choose a package name. "js9" is already taken on npm by the upstream
#      project, so this fork must publish under a scoped name, e.g.
#      "@your-scope/js9". Update package.json "name" accordingly.
#   3. Decide WHAT ships. JS9's value on npm is as a CDN source (jsDelivr/unpkg
#      serve the browser bundles via <script>), not as an `import` library. The
#      built bundles live in _site/ after `npm run build`, and _site/ is
#      gitignored, so add a package.json "files" whitelist that includes the
#      artifacts you want to serve (built by the prepare hook), and verify with
#      `npm pack --dry-run`. (Current .npmignore targets the OLD flat layout and
#      needs replacing for the src/ + _site/ structure.)
#   4. Authentication — pick one:
#      a. Trusted publishing (recommended): configure this repo as a trusted
#         publisher for the package on npmjs.com; then no token is needed and
#         --provenance works via OIDC (id-token: write below).
#      b. Token: add an npm automation token as the NPM_TOKEN repo secret and
#         set NODE_AUTH_TOKEN in the publish step.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Fail-safe review: prints the exact file list that would be published.
      - run: npm pack --dry-run

      - name: Publish
        run: npm publish --provenance --access public
        # For token auth (prerequisite 4b) instead of trusted publishing:
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
