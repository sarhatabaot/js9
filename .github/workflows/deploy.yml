name: Deploy site to GitHub Pages

# Builds the static site (npm run build -> _site/) and publishes it to GitHub
# Pages. The site is fully client-side (helperType "none"), so Pages serves it
# with no back end.
#
# One-time repo setup: Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions". Then pushes to the default branch deploy automatically;
# you can also run it manually from the Actions tab.

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions the deploy-pages action needs (OIDC + Pages write).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let a newer run supersede an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build the static site (-> _site/)
        run: npm run build

      - uses: actions/configure-pages@v5

      - name: Upload _site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
